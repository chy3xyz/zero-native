name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# CI for the zero-native framework.
#
# This workflow runs `zig build`, `zig build test`, and the docs build on every
# push and pull request to `main`. The matrix currently only targets
# ubuntu-latest; `macos-latest` will be added once the CEF runtime download is
# hosted in CI (the runner image does not ship the framework, and `zig build
# test` skips CEF-only checks when `-Dweb-engine=chromium` is omitted).

jobs:
  test:
    name: Zig build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # TODO: add `macos-latest` once CEF runtime download is hosted in CI.
        os: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v0.1
        with:
          version: 0.17.0-dev.813+2153f8143
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Build docs
        run: pnpm build
        working-directory: docs