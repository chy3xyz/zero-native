name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# CI for the zero-native framework.
#
# This workflow runs `zig build`, `zig build test`, and the docs build on every
# push and pull request to `main`. The build matrix covers the desktop platforms
# we ship for (Linux, macOS, and Windows). Full tests run on Ubuntu; macOS and
# Windows runners at least compile the framework to catch cross-platform
# regressions. The Chromium/CEF runtime is not bundled here; CEF-specific
# validation is handled by the separate CEF Runtime workflow.

jobs:
  test:
    name: Zig build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.813+2153f8143
          cache: true

      - name: Install native dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: zig build
        run: zig build

      - name: zig build test (default)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: zig build test

      - name: zig build test (with SQLite)
        if: runner.os == 'Linux'
        run: zig build test -Dsqlite=true

  audit:
    name: Audit app.zon
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.813+2153f8143
          cache: true

      - name: zig build
        run: zig build

      # `zero-native audit` exits 0 for info-only manifests, 1 when
      # warnings are reported, and 2 when blocking errors are found. We
      # treat exit 0 and 1 as success (warn is non-blocking) and only
      # fail the job on exit 2 (audit errors).
      - name: Run zero-native audit
        run: |
          set +e
          ./zig-out/bin/zero-native audit app.zon
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::error::zero-native audit reported blocking errors (exit code 2)"
            exit 2
          fi
          if [ "$code" -ne 0 ]; then
            echo "::warning::zero-native audit reported warnings (exit code $code)"
          fi
          exit 0

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Build docs
        run: pnpm build
        working-directory: docs